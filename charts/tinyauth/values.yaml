# Default values for tinyauth.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1 # @schema default: 1
deploymentStrategy:
  type: RollingUpdate # @schema default: "RollingUpdate"

image:
  repository: ghcr.io/steveiliop56/tinyauth # @schema default: "ghcr.io/steveiliop56/tinyauth"
  pullPolicy: IfNotPresent # @schema default: "IfNotPresent"
  # Overrides the image tag whose default is the chart appVersion.
  tag: "" # @schema default: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP # @schema default: "ClusterIP"
  port: 80 # @schema default: 80

# Tinyauth Configuration
tinyauth:
  # The base URL where the app is hosted.
  appUrl: "" # @schema default: ""; required: true
  # The directory where resources are stored.
  resourcesDir: "/data/resources" # @schema default: "/data/resources"
  # The path to the database file.
  databasePath: "/data/tinyauth.db" # @schema default: "/data/tinyauth.db"
  # Disable analytics.
  disableAnalytics: false # @schema default: false
  # Disable resources server.
  disableResources: false # @schema default: false

  # server config
  server:
    # The port on which the server listens.
    port: 3000 # @schema default: 3000
    # The address on which the server listens.
    address: "0.0.0.0" # @schema default: "0.0.0.0"
    # The path to the Unix socket.
    socketPath: "" # @schema default: ""

  # auth config
  auth:
    # IP allowlisting and blacklisting settings
    ip:
      # List of allowed IPs or CIDR ranges.
      allow: "" # @schema default: ""
      # List of blocked IPs or CIDR ranges.
      block: "" # @schema default: ""
    # Comma-separated list of users (username:hashed_password).
    users: "" # @schema default: ""
    # Path to the users file.
    usersFile: "" # @schema default: ""
    # Enable secure cookies.
    secureCookie: false # @schema default: false
    # Session expiry time in seconds.
    sessionExpiry: 86400 # @schema default: 86400
    # Maximum session lifetime in seconds.
    sessionMaxLifetime: 0 # @schema default: 0
    # Login timeout in seconds.
    loginTimeout: 300 # @schema default: 300
    # Maximum login retries.
    loginMaxRetries: 3 # @schema default: 3
    # Comma-separated list of trusted proxy addresses.
    trustedProxies: "" # @schema default: ""

  # oauth config
  oauth:
    # Comma-separated list of allowed OAuth domains.
    whitelist: "" # @schema default: ""
    # The OAuth provider to use for automatic redirection.
    autoRedirect: "" # @schema default: ""
    # OAuth providers list.
    providers: # @schema type:array; default:[]
      - id: "" # @schema type:string; default:""
        clientId: "" # @schema type:string; default:""
        clientSecret: "" # @schema type:string; default:""
        clientSecretFile: "" # @schema type:string; default:""
        clientSecretSecretRef: # @schema type:object
          name: "" # @schema type:string; default:""
          key: "" # @schema type:string; default:""
        scopes: "" # @schema type:string; default:""
        redirectUrl: "" # @schema type:string; default:""
        authUrl: "" # @schema type:string; default:""
        tokenUrl: "" # @schema type:string; default:""
        userInfoUrl: "" # @schema type:string; default:""
        insecure: false # @schema type:boolean; default:false
        name: "" # @schema type:string; default:""

  # oidc config
  oidc:
    # Path to the private key file.
    privateKeyPath: "" # @schema default: ""
    # Path to the public key file.
    publicKeyPath: "" # @schema default: ""
    # OIDC clients list.
    clients: # @schema type:array; default:[]
      - id: "" # @schema type:string; default:""
        clientId: "" # @schema type:string; default:""
        clientSecret: "" # @schema type:string; default:""
        clientSecretFile: "" # @schema type:string; default:""
        clientSecretSecretRef: # @schema type:object
          name: "" # @schema type:string; default:""
          key: "" # @schema type:string; default:""
        trustedRedirectUris: "" # @schema type:string; default:""
        name: "" # @schema type:string; default:""

  # ui config
  ui:
    # The title of the UI.
    title: "Tinyauth" # @schema default: "Tinyauth"
    # Message displayed on the forgot password page.
    forgotPasswordMessage: "You can change your password by changing the configuration." # @schema default: "You can change your password by changing the configuration."
    # Path to the background image.
    backgroundImage: "/background.jpg" # @schema default: "/background.jpg"
    # Disable UI warnings.
    disableWarnings: false # @schema default: false

  # ldap config
  ldap:
    # LDAP server address.
    address: "" # @schema default: ""
    # Bind DN for LDAP authentication.
    bindDn: "" # @schema default: ""
    # Bind password for LDAP authentication.
    bindPassword: "" # @schema default: ""
    bindPasswordSecretRef:
      name: "" # @schema default: ""
      key: "" # @schema default: ""
    # Base DN for LDAP searches.
    baseDn: "" # @schema default: ""
    # Allow insecure LDAP connections.
    insecure: false # @schema default: false
    # LDAP search filter.
    searchFilter: "(uid=%s)" # @schema default: "(uid=%s)"
    # Certificate for mTLS authentication.
    authCert: "" # @schema default: ""
    # Certificate key for mTLS authentication.
    authKey: "" # @schema default: ""
    # Cache duration for LDAP group membership in seconds.
    groupCacheTtl: 900 # @schema default: 900

  # log config
  log:
    # Log level (trace, debug, info, warn, error).
    level: "info" # @schema default: "info"
    # Enable JSON formatted logs.
    json: false # @schema default: false
    streams:
      http:
        # Enable this log stream.
        enabled: true # @schema default: true
        # Log level for this stream. Use global if empty.
        level: "" # @schema default: ""
      app:
        # Enable this log stream.
        enabled: true # @schema default: true
        # Log level for this stream. Use global if empty.
        level: "" # @schema default: ""
      audit:
        # Enable this log stream.
        enabled: false # @schema default: false
        # Log level for this stream. Use global if empty.
        level: "" # @schema default: ""

ingress:
  enabled: false # @schema default: false
  className: "" # @schema default: ""
  annotations: {} # @schema default: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts: # @schema default: [{"host": "chart-example.local", "paths": [{"path": "/", "pathType": "ImplementationSpecific"}]}]
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: [] # @schema default: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe: # @schema default: {"httpGet": {"path": "/api/healthz", "port": "http"}}
  httpGet:
    path: /api/healthz
    port: http
readinessProbe: # @schema default: {"httpGet": {"path": "/api/healthz", "port": "http"}}
  httpGet:
    path: /api/healthz
    port: http

autoscaling:
  enabled: false # @schema default: false
  minReplicas: 1 # @schema default: 1
  maxReplicas: 10 # @schema default: 10
  targetCPUUtilizationPercentage: 80 # @schema default: 80
  targetMemoryUtilizationPercentage: 80 # @schema default: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

httpRoute:
  enabled: false # @schema default: false
  annotations: {} # @schema default: {}
  parentRefs: # @schema default: [{"name": "my-gateway"}]
    - name: my-gateway
  hostnames: # @schema default: ["chart-example.local"]
    - chart-example.local
  rules: # @schema default: [{"matches": [{"path": {"type": "Prefix", "value": "/"}}]}]
    - matches:
        - path:
            type: Prefix
            value: /

# Additional environment variables for the container
env: [] # @schema default: []
# - name: CUSTOM_VAR
#   value: "custom_value"
# - name: SECRET_VAR
#   valueFrom:
#     secretKeyRef:
#       name: my-secret
#       key: secret-key

# Enable persistent storage for SQLite database and OIDC keys
# When enabled a PersistentVolumeClaim will be created to persist the SQLite database
# this ensures session data is not lost
persistence:
  enabled: false # @schema default: false; description: Enable persistent storage for SQLite session database
  # existingClaim: "" # @schema default: ""; description: Use an existing PersistentVolumeClaim instead of creating a new one
  storageClass: "" # @schema default: ""; description: StorageClass for the PVC. If not set, the default StorageClass will be used
  accessMode: ReadWriteOnce # @schema default: "ReadWriteOnce"; description: Access mode for the PVC
  size: 1Gi # @schema default: "1Gi"; description: Size of the PVC for SQLite database storage
  mountPath: /data # @schema default: "/data"; description: Mount path for the persistent volume where SQLite database will be stored
  annotations: {} # @schema default: {}; description: Annotations to add to the PVC
